<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.2/css/all.min.css"
    integrity="sha512-1sCRPdkRXhBV2PBLUdRb4tMg1w2YPf37qatUFeS7zlBy7jJI8Lf4VHwWfZZfpXtYSLy85pkm9GaYVYMfw5BC1A=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="styles/shopping-list.css" />
  <title>Shopping List</title>
</head>

<body>
  <div class="container">
    <header>
      <img src="images/note.png" alt="" />
      <h1 id="app-title" class="shopping-class the-class">Shopping List</h1>
    </header>
    <form id="item-form" method="POST">
      <div class="form-control">
        <input type="text" class="form-input" id="item-input" name="item" placeholder="Enter Item" />
      </div>
      <div class="form-control">
        <button type="button" class="btn">
          <i class="fa-solid fa-plus"></i> Add Item
        </button>
      </div>
    </form>

    <form action="www.google.com" method="GET" id="second-form"></form>

    <div class="filter">
      <input type="text" class="form-input-filter" id="filter" placeholder="Filter Items" />
    </div>

    <ul id="item-list" class="items">
      <li class="item">
        Apples
        <button class="remove-item btn-link text-red">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </li>
      <li class="item">
        Orange Juice
        <button class="remove-item btn-link text-red">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </li>
      <li class="item">
        Oreos
        <button class="remove-item btn-link text-red">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </li>
      <li class="item">
        Milk
        <button class="remove-item btn-link text-red">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </li>
    </ul>

    <div>
      <a href="#link1">Link 1</a>
      <a href="#link2">Link 2</a>
      <a href="#link3">Link 3</a>
      <a href="#link4">Link 4</a>
      <a href="#link5">Link 5</a>
    </div>

    <div class="parent">
      <div class="child">Child 1</div>
      <div class="child">Child 2</div>
      <div class="child">Child 3</div>
    </div>

    <div id="create-here"></div>

    <p></p>

    <button id="clear" class="btn-clear">Clear All</button>
  </div>

  <script src="style_classes.js"></script>
</body>

</html>
